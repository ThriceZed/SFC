<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home | Student Film Connection</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%233b6bf5'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>S</text></svg>">

<body data-page="home">
<section class="mini-hero">
  <span class="blob b1"></span><span class="blob b2"></span>
  <div class="container" style="position:relative;z-index:1">
    <h1 id="greeting">Hello!</h1>
    <div class="cta-row">
      <a class="btn btn-primary btn-lg" href="search.html">Search productions</a>
      <a class="btn btn-ghost btn-lg" href="create.html">Create production</a>
    </div>
  </div>
</section>

<section class="section" id="notableSection" hidden>
  <div class="container">
    <div class="section-head">
      <h2>Notable productions</h2>
      <p>Student productions that stand out. Don't miss out on these opportunities.</p>
    </div>
    <div class="grid grid-3" id="notableGrid"></div>
    <div class="center" style="margin-top:34px">
      <a class="btn btn-soft btn-lg" href="search.html">See all productions</a>
    </div>
  </div>
</section>

<script src="js/config.js"></script>
<script src="js/seed.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
(async function () {
  const user = await UI.mountChrome();
  if (!user) { location.replace("index.html"); return; }
  document.getElementById("greeting").textContent =
    `Hello, ${user.first_name || user.full_name?.split(" ")[0] || "there"}!`;

  // Same featured grid as the marketing page: notable first, falling back to
  // everything if there aren't enough flagged, with SFC+ creators promoted.
  const area = user.area_code || "";
  let list = await SFC.listProductions({ notableOnly: true }, area);
  if (list.length < 3) list = await SFC.listProductions({}, area);
  list = await UI.featuredFirst(list);

  // Nothing to feature yet: leave it out rather than show an empty grid
  // under a heading.
  if (!list.length) return;
  document.getElementById("notableSection").hidden = false;
  document.getElementById("notableGrid").innerHTML =
    list.slice(0, 3).map((p) => UI.prodCard(p)).join("");
  UI.observeReveals();
})();
</script>
