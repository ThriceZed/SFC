<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SFC+ | Student Film Connection</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%233b6bf5'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>S</text></svg>">

<body data-page="sfc-plus">
<section class="mini-hero" style="padding-bottom:44px">
  <span class="blob b1"></span><span class="blob b2"></span>
  <div class="container" style="position:relative;z-index:1">
    <h1>Back the platform. Get the checkmark.</h1>
  </div>
</section>

<div class="container" style="max-width:880px;padding-top:56px;padding-bottom:80px">
  <div class="grid grid-3" style="margin-bottom:44px">
    <div class="card card-pad">
      <h3 style="font-size:1.05rem">Featured priority</h3>
      <p class="soft" style="font-size:.92rem;margin:0">Your productions come first in the featured section on the search and home pages.</p>
    </div>
    <div class="card card-pad">
      <h3 style="font-size:1.05rem">Verified checkmark</h3>
      <p class="soft" style="font-size:.92rem;margin:0">A checkmark next to your name everywhere it appears on SFC.</p>
    </div>
    <div class="card card-pad">
      <h3 style="font-size:1.05rem">Fund the site</h3>
      <p class="soft" style="font-size:.92rem;margin:0">SFC stays free for every student filmmaker.</p>
    </div>
  </div>

  <div id="root"></div>
</div>

<script src="js/config.js"></script>
<script src="js/seed.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
(async function () {
  const user = await UI.mountChrome();
  const root = document.getElementById("root");

  if (!user) {
    root.innerHTML = `<div class="card card-pad center" style="padding:50px">
      <h2>Sign in to redeem a code</h2>
      <p class="soft" style="max-width:36ch;margin:8px auto 20px">You'll need an SFC account before claiming SFC+.</p>
      <button class="btn btn-primary btn-lg" id="signinBtn">Sign up or log in</button></div>`;
    document.getElementById("signinBtn").onclick = () => UI.openAuth("login");
    return;
  }

  if ((user.badges || []).includes("SFC+")) {
    root.innerHTML = `<div class="card card-pad center" style="padding:50px">
      <div style="font-size:2.2rem">${UI.verifiedHTML(user) || "✓"}</div>
      <h2 style="margin-top:14px">You're on SFC+</h2>
      <p class="soft">Thanks for backing the platform.</p></div>`;
    return;
  }

  root.innerHTML = `<div class="card card-pad" style="padding:34px;max-width:480px;margin:0 auto">
    <h3 style="margin-bottom:6px">Have a code?</h3>
    <p class="soft" style="font-size:.92rem">Codes are issued by SFC staff. Each one works for one account.</p>
    <form id="redeemForm">
      <div class="field"><label>Code</label>
        <input class="input" name="code" required placeholder="SFC-XXXX-XXXX" autocomplete="off" style="text-transform:uppercase"></div>
      <button class="btn btn-primary btn-block btn-lg" type="submit">Redeem</button>
    </form>
  </div>`;

  document.getElementById("redeemForm").onsubmit = async (e) => {
    e.preventDefault();
    const f = e.target;
    try {
      UI.setBusy(f, true);
      await SFC.redeemCode(f.code.value.trim());
      UI.toast("Welcome to SFC+!", "ok");
      setTimeout(() => location.reload(), 700);
    } catch (err) { UI.toast(err.message, "err"); UI.setBusy(f, false); }
  };
})();
</script>
