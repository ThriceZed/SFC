<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account | Student Film Connection</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%233b6bf5'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>S</text></svg>">

<body data-page="account">
<div class="page">
  <div class="container">
    <div id="root"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/seed.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
(async function () {
  const user = await UI.mountChrome();
  const root = document.getElementById("root");

  if (!user) {
    root.innerHTML = `<div class="empty" style="padding:80px 20px"><div class="ico">👤</div>
      <h2>Sign in to your account</h2>
      <p class="soft" style="max-width:38ch;margin:8px auto 20px">Manage your profile, productions, and applications.</p>
      <button class="btn btn-primary btn-lg" id="signinBtn">Sign up or log in</button></div>`;
    document.getElementById("signinBtn").onclick = () => UI.openAuth("login");
    return;
  }

  const [myProds, myApps] = await Promise.all([
    SFC.listUserProductions(user.id),
    SFC.listUserApplications(user.id),
  ]);

  root.innerHTML = `
    <div class="page-head" style="display:flex;align-items:center;gap:18px">
      <div class="avatar" style="width:64px;height:64px;font-size:1.4rem">${UI.initials(user.full_name)}</div>
      <div style="flex:1;min-width:0">
        <h1 class="name-row" style="margin:0;gap:10px">
          ${UI.esc(user.full_name)}${UI.nameBadgesHTML(user)}</h1>
        <p style="margin:0" class="muted">${UI.esc(UI.handle(user.username))}${user.location ? " · " + UI.esc(user.location) : ""}
          ${user.is_group ? '<span class="chip blue" style="margin-left:6px">Group</span>' : ""}</p>
      </div>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Log out</button>
    </div>

    <div class="acct-grid">
      <nav class="acct-nav">
        <button data-tab="profile" class="active">Profile</button>
        <button data-tab="productions">My productions <span class="chip gray" style="margin-left:4px">${myProds.length}</span></button>
        <button data-tab="applications">My applications <span class="chip gray" style="margin-left:4px">${myApps.length}</span></button>
      </nav>
      <div id="panel"></div>
    </div>`;

  document.getElementById("logoutBtn").onclick = async () => { await SFC.signOut(); location.href = "index.html"; };

  const panel = document.getElementById("panel");
  const tabs = { profile: renderProfile, productions: renderProductions, applications: renderApplications };
  root.querySelectorAll(".acct-nav button").forEach((b) => b.onclick = () => {
    root.querySelectorAll(".acct-nav button").forEach((x) => x.classList.toggle("active", x === b));
    tabs[b.dataset.tab]();
  });
  renderProfile();

  // ---------- Profile ----------
  function renderProfile() {
    const expOpts = window.SFC_CONFIG.EXPERIENCE.map((e) =>
      `<option value="${e.id}" ${user.experience === e.id ? "selected" : ""}>${e.label}</option>`).join("");
    // Fall back to splitting full_name for accounts made before the name split.
    const first = user.first_name ?? (user.full_name || "").split(" ")[0] ?? "";
    const last = user.last_name ?? (user.full_name || "").split(" ").slice(1).join(" ");

    const plusPromo = (user.badges || []).includes("SFC+") ? "" : `
      <a href="sfc-plus.html" class="card card-pad card-hover"
         style="display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:18px 22px">
        <span class="verified-check" style="width:26px;height:26px;padding:5px">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
        <div style="flex:1"><strong style="font-family:'Space Grotesk'">Get SFC+</strong>
          <div class="muted" style="font-size:.85rem">Get the checkmark and back the platform.</div></div>
        <span class="soft">→</span>
      </a>`;

    panel.innerHTML = `${plusPromo}<form id="pf" class="card card-pad" style="padding:28px">
      <h3 style="margin-bottom:18px">Edit profile</h3>
      <div class="row2">
        <div class="field"><label>First name</label><input class="input" name="first_name" value="${UI.esc(first)}"></div>
        <div class="field"><label>Last name</label><input class="input" name="last_name" value="${UI.esc(last)}"></div>
      </div>
      <div class="field">
        <label>Username</label>
        <input class="input" value="${UI.esc(user.username)}" disabled style="opacity:.6;cursor:not-allowed">
        <div class="hint">Usernames can't be changed for now.</div>
      </div>
      <div class="field">
        <label class="switch"><input type="checkbox" name="is_group" ${user.is_group ? "checked" : ""}>
          <span class="track"></span><span>This account is a group / club</span></label>
      </div>
      <div class="field" id="groupNameField" style="display:${user.is_group ? "" : "none"}">
        <label>Group name</label><input class="input" name="group_name" value="${UI.esc(user.group_name || "")}" placeholder="Lens Collective">
      </div>
      <div class="field"><label>Bio</label><textarea class="textarea" name="bio" placeholder="Tell people about your style and what you're looking for…">${UI.esc(user.bio || "")}</textarea></div>
      <div class="field"><label>Roles you do</label>
        <div class="pill-select" id="rolesPick">${UI.rolesHTML("pfRoles", user.roles || [])}</div></div>
      <div class="row2">
        <div class="field"><label>Experience</label><select class="select" name="experience">${expOpts}</select></div>
        <div class="field"><label>Area / zip code</label><input class="input" value="${UI.esc(user.area_code || "")}" name="area_code"></div>
      </div>
      <div class="field"><label>Location</label><input class="input" name="location" value="${UI.esc(user.location || "")}"></div>
      <div class="field"><label>Gear</label>
        <div class="hint" style="margin:0 0 8px">Pick what you own, or add your own under Other.</div>
        ${UI.gearHTML(user.gear_list || [], user.gear || "")}
      </div>
      <hr class="divider">
      <h4 style="margin-bottom:14px">Contact <span class="muted" style="font-weight:400;font-size:.85rem">(shared only after you're accepted)</span></h4>
      <div class="row2">
        <div class="field"><label>Email</label><input class="input" name="contact_email" value="${UI.esc(user.contact_email || "")}"></div>
        <div class="field"><label>Instagram</label><input class="input" name="contact_ig" value="${UI.esc(user.contact_ig || "")}"></div>
      </div>
      <div class="field"><label>Phone</label><input class="input" name="contact_phone" value="${UI.esc(user.contact_phone || "")}"></div>
      <button class="btn btn-primary btn-lg" type="submit">Save changes</button>
    </form>`;

    // Reveal the group name field the moment the account is switched to a group.
    const pf = document.getElementById("pf");
    pf.is_group.onchange = (e) => {
      document.getElementById("groupNameField").style.display = e.target.checked ? "" : "none";
    };
    UI.wireGear(pf);

    pf.onsubmit = async (e) => {
      e.preventDefault();
      const f = e.target;
      // Scoped to #rolesPick: the gear picker also uses .pill-select.
      const roles = [...f.querySelectorAll("#rolesPick input:checked")].map((i) => i.value);
      const fn = f.first_name.value.trim(), ln = f.last_name.value.trim();
      // gear_list = picked presets, gear = whatever they typed under Other.
      const { gear_list, gear } = UI.readGear(f);
      const patch = {
        first_name: fn, last_name: ln, full_name: `${fn} ${ln}`.trim(),
        bio: f.bio.value.trim(), roles, experience: f.experience.value,
        area_code: f.area_code.value.trim(), location: f.location.value.trim(),
        gear_list, gear, contact_email: f.contact_email.value.trim(),
        // Store handles bare; the UI adds the @ when rendering.
        contact_ig: f.contact_ig.value.trim().replace(/^@+/, ""),
        contact_phone: f.contact_phone.value.trim(),
        is_group: f.is_group.checked,
        group_name: f.is_group.checked ? f.group_name.value.trim() : "",
      };
      try {
        UI.setBusy(f, true);
        Object.assign(user, await SFC.updateProfile(patch));
        UI.toast("Profile saved", "ok"); UI.setBusy(f, false);
      } catch (err) { UI.toast(err.message, "err"); UI.setBusy(f, false); }
    };
  }

  // ---------- My productions ----------
  async function renderProductions() {
    if (!myProds.length) {
      panel.innerHTML = emptyCard("🎬", "No productions yet", "Post a shoot and start building your crew.", "Post a production", "create.html");
      return;
    }
    const cards = await Promise.all(myProds.map(async (p) => {
      const apps = await SFC.listApplicationsForProduction(p.id);
      const pending = apps.filter((a) => a.status === "pending").length;
      const accepted = apps.filter((a) => a.status === "accepted").length;
      return `<a class="card card-hover card-pad" href="production.html?id=${encodeURIComponent(p.id)}" style="display:flex;gap:16px;align-items:center">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px"><strong style="font-size:1.1rem">${UI.esc(p.title)}</strong>${UI.statusChip(p.status)}</div>
          <div class="muted" style="font-size:.88rem;margin-top:2px">${UI.fmtDateRange(p.start_date, p.end_date)} · ${UI.esc(p.location)}</div>
        </div>
        <div style="text-align:right">
          <div><span class="chip amber">${pending} pending</span></div>
          <div style="margin-top:6px"><span class="chip green">${accepted} on roster</span></div>
        </div></a>`;
    }));
    panel.innerHTML = `<div style="display:flex;flex-direction:column;gap:14px">${cards.join("")}
      <a class="btn btn-soft" href="create.html" style="align-self:flex-start">+ Post another production</a></div>`;
  }

  // ---------- My applications ----------
  async function renderApplications() {
    if (!myApps.length) {
      panel.innerHTML = emptyCard("✋", "No applications yet", "Browse productions and apply for a role.", "Browse productions", "search.html");
      return;
    }
    const rows = await Promise.all(myApps.map(async (a) => {
      const prod = await SFC.getProduction(a.production_id);
      if (!prod) return "";
      const cls = { pending: "amber", accepted: "green", declined: "gray" }[a.status];
      return `<a class="card card-hover card-pad" href="production.html?id=${encodeURIComponent(prod.id)}" style="display:flex;gap:16px;align-items:center">
        <div style="flex:1">
          <strong style="font-size:1.1rem">${UI.esc(prod.title)}</strong>
          <div class="muted" style="font-size:.88rem;margin-top:2px">Applied as ${UI.esc(a.role)} · ${UI.fmtDateRange(prod.start_date, prod.end_date)}</div>
        </div>
        <span class="chip status ${cls}">${a.status}</span></a>`;
    }));
    panel.innerHTML = `<div style="display:flex;flex-direction:column;gap:14px">${rows.join("")}</div>`;
  }

  function emptyCard(ico, title, sub, btn, href) {
    return `<div class="card card-pad empty"><div class="ico">${ico}</div><h3>${title}</h3>
      <p style="max-width:34ch;margin:0 auto 18px">${sub}</p>
      <a class="btn btn-primary" href="${href}">${btn}</a></div>`;
  }
})();
</script>
