<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Post a production | Student Film Connection</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%233b6bf5'/><text x='50' y='68' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>S</text></svg>">

<body data-page="create">
<div class="page">
  <div class="container" style="max-width:760px">
    <div class="page-head">
      <h1>Post a production</h1>
      <p>List your film or shoot, choose the roles you need, and start reviewing applicants.</p>
    </div>

    <div id="gate"></div>

    <form id="prodForm" class="card card-pad" style="padding:30px;display:none">
      <div class="field">
        <label>Title</label>
        <input class="input" name="title" required placeholder="e.g. Fly Away">
      </div>

      <div class="field">
        <label>What are you posting?</label>
        <div class="pill-select" id="typeSel">
          <input type="radio" name="type" id="type_project" value="project" checked>
          <label for="type_project">🎬 Film project</label>
          <input type="radio" name="type" id="type_shoot" value="shoot">
          <label for="type_shoot">📸 Single shoot / day</label>
        </div>
        <div class="hint">A project is a whole film; a shoot is a single day people sign on for.</div>
      </div>

      <div class="field">
        <label>Logline</label>
        <input class="input" name="logline" required maxlength="140" placeholder="One-sentence hook for your story">
      </div>

      <div class="field">
        <label>Details</label>
        <textarea class="textarea" name="description" placeholder="Shoot dates, vibe, expectations, what you're providing…"></textarea>
      </div>

      <div class="field">
        <label class="switch"><input type="checkbox" id="openAny" name="open_to_any">
          <span class="track"></span><span>Open to any role. I'll take talented people wherever they fit</span></label>
      </div>

      <div class="field" id="rolesBlock">
        <label>Roles you need</label>
        <div class="pill-select" id="rolesSel"></div>
        <div class="hint">Selected roles appear below so you can set how many of each.</div>
        <div id="roleCounts" style="display:flex;flex-direction:column;gap:8px;margin-top:12px"></div>
      </div>

      <hr class="divider">

      <div class="row2">
        <div class="field"><label>Start date</label><input class="input" type="date" name="start_date" required></div>
        <div class="field">
          <label>End date</label>
          <input class="input" type="date" name="end_date" id="endDate">
          <label class="switch" style="margin-top:10px">
            <input type="checkbox" id="endTBD"><span class="track"></span>
            <span>End date is TBD</span>
          </label>
        </div>
      </div>
      <div class="row2">
        <div class="field"><label>Location</label><input class="input" name="location" required placeholder="Austin, TX"></div>
        <div class="field"><label>Area / zip code</label><input class="input" name="area_code" required placeholder="78701"></div>
      </div>

      <div class="field">
        <label class="switch"><input type="checkbox" name="paid"><span class="track"></span>
          <span>This is a paid production</span></label>
      </div>

      <div class="field">
        <label>Gear / what you provide <span class="muted">(optional)</span></label>
        <input class="input" name="gear_provided" placeholder="Camera, lighting, meals, transport…">
      </div>

      <button class="btn btn-primary btn-block btn-lg" type="submit">Post production →</button>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/seed.js"></script>
<script src="js/store.js"></script>
<script src="js/app.js"></script>
<script>
(async function () {
  const user = await UI.mountChrome();
  const $ = (s) => document.querySelector(s);
  const form = $("#prodForm");

  if (!user) {
    $("#gate").innerHTML = `<div class="card card-pad center" style="padding:50px">
      <div style="font-size:2.4rem">🔐</div>
      <h2>Sign in to post</h2>
      <p class="soft" style="max-width:40ch;margin:8px auto 20px">You need a filmmaker account to create a production and manage applicants.</p>
      <button class="btn btn-primary btn-lg" id="gateBtn">Sign up or log in</button></div>`;
    $("#gateBtn").onclick = () => UI.openAuth("login");
    return;
  }

  form.style.display = "";
  // prefill location
  form.location.value = user.location || "";
  form.area_code.value = user.area_code || "";

  // roles pills
  $("#rolesSel").innerHTML = UI.rolesHTML("crRoles");

  const openAny = $("#openAny"), rolesBlock = $("#rolesBlock");
  openAny.onchange = () => { rolesBlock.style.opacity = openAny.checked ? ".4" : "1"; rolesBlock.style.pointerEvents = openAny.checked ? "none" : ""; };

  // TBD end date: null it out and grey the picker.
  const endDate = $("#endDate"), endTBD = $("#endTBD");
  endTBD.onchange = () => {
    endDate.disabled = endTBD.checked;
    endDate.style.opacity = endTBD.checked ? ".45" : "1";
    if (endTBD.checked) endDate.value = "";
  };

  // role count rows
  function refreshCounts() {
    const checked = [...$("#rolesSel").querySelectorAll("input:checked")];
    $("#roleCounts").innerHTML = checked.map((c) => `
      <div style="display:flex;align-items:center;gap:12px;background:var(--surface-2);padding:8px 12px;border-radius:var(--r-md)">
        <span style="flex:1;font-weight:600;font-size:.9rem">${UI.esc(c.value)}</span>
        <span class="muted" style="font-size:.85rem">How many?</span>
        <input class="input" type="number" min="1" value="1" data-role="${UI.esc(c.value)}" style="width:74px;padding:6px 10px">
      </div>`).join("");
  }
  $("#rolesSel").addEventListener("change", refreshCounts);

  form.onsubmit = async (e) => {
    e.preventDefault();
    const roles_needed = openAny.checked ? [] :
      [...$("#roleCounts").querySelectorAll("input[data-role]")].map((i) =>
        ({ role: i.dataset.role, count: Math.max(1, +i.value || 1) }));

    if (!openAny.checked && roles_needed.length === 0) {
      return UI.toast("Pick at least one role, or switch on “open to any role”.", "err");
    }
    const data = {
      title: form.title.value.trim(),
      type: form.type.value,
      logline: form.logline.value.trim(),
      description: form.description.value.trim(),
      open_to_any: openAny.checked,
      roles_needed,
      start_date: form.start_date.value,
      // null end_date means TBD; the UI renders it as "Sep 1, 2026 – TBD".
      end_date: endTBD.checked ? null : (form.end_date.value || form.start_date.value),
      location: form.location.value.trim(),
      area_code: form.area_code.value.trim(),
      paid: form.paid.checked,
      gear_provided: form.gear_provided.value.trim(),
    };
    try {
      UI.setBusy(form, true);
      const rec = await SFC.createProduction(data);
      UI.toast("Production posted!", "ok");
      setTimeout(() => location.href = `production.html?id=${encodeURIComponent(rec.id)}`, 500);
    } catch (err) { UI.toast(err.message, "err"); UI.setBusy(form, false); }
  };
})();
</script>
